<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Projections</title>
    <style>
        /* Basic reset and font styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f6f8fa;
            color: #24292f;
        }

        /* The Navigation Bar container */
        .navbar {
            background-color: #24292f; /* GitHub dark gray */
            display: flex;
            align-items: center;
            padding: 0 20px;
            height: 60px;
        }

        /* Site Title / Brand */
        .nav-logo {
            color: white;
            font-weight: bold;
            text-decoration: none;
            font-size: 1.2rem;
            margin-right: 40px;
        }

        /* Navigation Links Menu */
        .nav-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 25px;
        }

        .nav-links a {
            color: #adbac7;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: white;
        }

        /* Page Content Area */
        .content {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- Header / Navbar (Now populates automatically!) -->
    <nav class="navbar" id="global-nav"></nav>

    <!-- Main Content -->
    <div class="content">
        <h1>Welcome to My Website</h1>
        <p>This page is hosted entirely for free on GitHub Pages. Use the menu links above to jump straight to different country dashboards or code sections.</p>
    </div>

    <!-- The Magic Script: Feeds navbar.html layout straight into the page -->
    <script>
        fetch('navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('global-nav').innerHTML = data;
            })
            .catch(error => console.error('Error loading navigation:', error));
    </script>

</body>
</html>
