<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Australian Seat Projector 2025</title>
<style>
  :root{
    --paper:#F7F4EB; --ink:#1B2A4A; --muted:#7A6F58; --line:#D8D2C2;
    --mono:'JetBrains Mono','Courier New',monospace;
    --serif:'Source Serif Pro',Georgia,serif;
  }
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--serif);}
  #root{max-width:1040px;margin:0 auto;padding:24px;}
  h1{font-size:28px;margin:4px 0 0;font-weight:700;}
  h2{font-size:16px;margin:0 0 10px;text-transform:uppercase;letter-spacing:.08em;}
  .eyebrow{font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
  .head{border-bottom:3px double var(--ink);padding-bottom:10px;margin-bottom:20px;}
  .spx-card{background:#FFFDF7;border:1px solid var(--line);border-radius:4px;padding:18px;margin-bottom:20px;}
  .spx-mono{font-family:var(--mono);}
  .spx-row{display:flex;align-items:center;gap:12px;margin:8px 0;}
  .swatch{display:inline-block;width:10px;height:10px;margin-right:6px;border-radius:2px;vertical-align:middle;}
  .plabel{font-weight:600;min-width:150px;}
  .spx-slider{flex:1;accent-color:var(--ink);}
  .spx-input{width:74px;font-family:var(--mono);font-size:14px;padding:3px 5px;border:1px solid var(--line);border-radius:3px;text-align:right;}
  .btn{font-family:var(--mono);font-size:12px;padding:6px 12px;background:var(--ink);color:#fff;border:none;border-radius:3px;cursor:pointer;margin-top:8px;}
  .btn:hover{opacity:.9;}
  .sub{font-size:13px;color:var(--muted);}
  .prefdev{font-family:var(--mono);font-size:11px;}
  /* tally bar */
  .bar{display:flex;height:34px;border-radius:4px;overflow:hidden;border:1px solid var(--line);position:relative;}
  .bar .seg{display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-family:var(--mono);min-width:0;}
  .maj{position:absolute;top:-6px;bottom:-6px;width:2px;background:var(--ink);}
  .maj::after{content:'76';position:absolute;top:-16px;left:-7px;font-size:10px;font-family:var(--mono);color:var(--ink);}
  /* map */
  .maprow{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start;}
  .natwrap{flex:1 1 520px;min-width:320px;}
  .insetgrid{display:flex;flex-wrap:wrap;gap:10px;flex:1 1 360px;}
  .inset{border:1px solid var(--line);border-radius:4px;padding:6px 6px 2px;background:#FBFAF4;}
  .inset .ttl{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:0 0 2px 2px;}
  svg.map{display:block;width:100%;height:auto;}
  svg.map path{stroke:var(--paper);stroke-width:.5;cursor:pointer;transition:opacity .08s;}
  svg.map path:hover{opacity:.75;}
  svg.map path.sel{stroke:#111;stroke-width:1.6;}
  .inset svg.map path{stroke-width:.7;}
  .tip{position:fixed;pointer-events:none;background:var(--ink);color:#fff;font-family:var(--mono);font-size:11px;
       padding:7px 9px;border-radius:5px;opacity:0;transition:opacity .1s;z-index:20;max-width:250px;line-height:1.4;
       box-shadow:0 4px 14px rgba(0,0,0,.25);}
  .tiphead{font-weight:700;font-size:12px;margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid rgba(255,255,255,.22);}
  .tiphead span{float:right;font-weight:400;opacity:.65;}
  .tipsec{font-size:9px;text-transform:uppercase;letter-spacing:.09em;opacity:.6;margin:6px 0 2px;}
  .tiprow{display:flex;align-items:center;gap:6px;font-size:11px;line-height:1.55;}
  .tiprow b{margin-left:auto;padding-left:10px;font-variant-numeric:tabular-nums;font-weight:600;}
  .tiprow.muted{opacity:.68;}
  .tiprow.win{font-weight:600;}
  .tsw{display:inline-block;width:8px;height:8px;border-radius:2px;flex:0 0 auto;}
  .natwrap{position:relative;}
  .natwrap svg.map path{vector-effect:non-scaling-stroke;}
  svg.map.zoomable{cursor:grab;touch-action:none;}
  svg.map.zoomable.grabbing{cursor:grabbing;}
  .zoomctrls{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px;z-index:5;}
  .zoombtn{width:30px;height:30px;font-family:var(--mono);font-size:15px;line-height:1;background:#FFFDF7;
           border:1px solid var(--line);border-radius:4px;cursor:pointer;color:var(--ink);padding:0;}
  .zoombtn.rst{width:auto;padding:0 8px;font-size:11px;height:30px;}
  .zoombtn:hover{background:#fff;border-color:var(--ink);}
  .legrow{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;font-size:13px;}
  .leg{display:flex;align-items:center;gap:5px;}
  /* seat lists */
  .catblock{border-top:1px solid var(--line);padding:8px 0;}
  .cathead{display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:600;}
  .cathead .count{font-family:var(--mono);color:var(--muted);font-weight:400;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 4px;}
  .chip{font-size:12px;font-family:var(--mono);padding:2px 7px;border:1px solid var(--line);border-radius:10px;cursor:pointer;background:#fff;}
  .chip:hover{border-color:var(--ink);}
  .chip.sel{background:var(--ink);color:#fff;border-color:var(--ink);}
  .note{font-size:12px;color:var(--muted);line-height:1.5;}
</style></head>

        el('span',{class:'swatch',style:'background:'+color(c)}),
        el('span',null,[fn(c)]),
        el('span',{class:'count'},['\u2014 '+seats.length+' seat'+(seats.length>1?'s':'')+'  '+(open?'\u25BE':'\u25B8')])
      ]);
      block.appendChild(head);
      if(open){
        var chips=el('div',{class:'chips'});
        seats.forEach(function(r){
          var chip=el('div',{class:'chip'+(selected===r.seat?' sel':''),'data-seat':r.seat,
            title:r.margin+' pp margin',onclick:function(){ selectSeat(r.seat,true); }},[ r.seat ]);
          chips.appendChild(chip);
        });
        block.appendChild(chips);
      }
      listsWrap.appendChild(block);
    });
  }

  /* ---------- selection + paint ---------- */
  function selectSeat(name,scroll){
    selected=(selected===name?null:name);
    repaintColors();
    paintLists();
    if(selected&&scroll){
      var cat=STATE.byseat[selected].winnerCat; expanded.add(cat); paintLists();
    }
  }
  function repaintColors(){
    Object.keys(seatEls).forEach(function(name){
      var x=STATE.byseat[name]; var col=x?color(x.winnerCat):Y.OTH;
      seatEls[name].forEach(function(p){ p.setAttribute('fill',col);
        p.classList.toggle('sel', selected===name); });
    });
  }

  /* ---------- update loop ---------- */
  function clamp(v){ v=Number(v); if(isNaN(v))v=0; return Math.max(0,Math.min(100,Math.round(v*10)/10)); }
  function reset(){ qo.forEach(p=>prim[p]=Cl[p]); Object.keys(Zo).forEach(k=>prefs[k]=Zo[k]); rebuildInputs(); update(); }
  function update(){
    STATE=compute();
    // Others leftover
    var used=qo.reduce((s,p)=>s+prim[p],0); var oth=Math.round((100-used)*10)/10;
    document.getElementById('othVal').textContent=oth+'%';
    document.getElementById('othInfo').textContent='2025 baseline was '+Cl.OTH+'%';
    document.getElementById('othVal').style.color=oth<0?'#c62828':'var(--ink)';
    // pref deviations
    Object.keys(prefs).forEach(function(k){ var el2=document.getElementById('dev_'+k); if(!el2)return;
      var d=Math.round((prefs[k]-50)*10)/10; el2.textContent=(d>=0?'+':'')+d+'pp'; el2.style.color=d>=0?'#2e7d32':'#c62828'; });
    repaintColors(); paintTally(); paintLists();
  }
  // for reset: refresh the slider/number DOM values
  function rebuildInputs(){
    root.querySelectorAll('input[type=range],input[type=number]').forEach(function(){});
    render(); // simplest: full rebuild
  }

  function render(){
    root.innerHTML='';
    var head=el('div',{class:'head'});
    head.appendChild(el('div',{class:'eyebrow'},['2025 baseline \u00B7 uniform national swing model']));
    head.appendChild(el('h1',null,['Australian House Seat Projector']));
    root.appendChild(head);
    seatEls={};
    root.appendChild(buildControls());
    root.appendChild(buildPrefs());
    root.appendChild(buildResults());
    root.appendChild(buildMap());
    update();
  }
  render();
})();
</script></body></html>
