<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Australian Seat Projector 2025</title>
<style>
  :root{
    --paper:#F7F4EB; --ink:#1B2A4A; --muted:#7A6F58; --line:#D8D2C2;
    --mono:'JetBrains Mono','Courier New',monospace;
    --serif:'Source Serif Pro',Georgia,serif;
  }
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--serif);}
  #root{max-width:1040px;margin:0 auto;padding:24px;}
  h1{font-size:28px;margin:4px 0 0;font-weight:700;}
  h2{font-size:16px;margin:0 0 10px;text-transform:uppercase;letter-spacing:.08em;}
  .eyebrow{font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
  .head{border-bottom:3px double var(--ink);padding-bottom:10px;margin-bottom:20px;}
  .spx-card{background:#FFFDF7;border:1px solid var(--line);border-radius:4px;padding:18px;margin-bottom:20px;}
  .spx-mono{font-family:var(--mono);}
  .spx-row{display:flex;align-items:center;gap:12px;margin:8px 0;}
  .swatch{display:inline-block;width:10px;height:10px;margin-right:6px;border-radius:2px;vertical-align:middle;}
  .plabel{font-weight:600;min-width:150px;}
  .spx-slider{flex:1;accent-color:var(--ink);}
  .spx-input{width:74px;font-family:var(--mono);font-size:14px;padding:3px 5px;border:1px solid var(--line);border-radius:3px;text-align:right;}
  .btn{font-family:var(--mono);font-size:12px;padding:6px 12px;background:var(--ink);color:#fff;border:none;border-radius:3px;cursor:pointer;margin-top:8px;}
  .btn:hover{opacity:.9;}
  .sub{font-size:13px;color:var(--muted);}
  .prefdev{font-family:var(--mono);font-size:11px;}
  /* tally bar */
  .bar{display:flex;height:34px;border-radius:4px;overflow:hidden;border:1px solid var(--line);position:relative;}
  .bar .seg{display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-family:var(--mono);min-width:0;}
  .maj{position:absolute;top:-6px;bottom:-6px;width:2px;background:var(--ink);}
  .maj::after{content:'76';position:absolute;top:-16px;left:-7px;font-size:10px;font-family:var(--mono);color:var(--ink);}
  /* map */
  .maprow{display:block;}
  .natwrap{width:100%;background:#FBFAF4;border:1px solid var(--line);border-radius:4px;overflow:hidden;}
  svg.map{display:block;width:100%;height:auto;}
  svg.map path{stroke:var(--paper);stroke-width:.5;cursor:pointer;transition:opacity .08s;}
  svg.map path:hover{opacity:.75;}
  svg.map path.sel{stroke:#111;stroke-width:1.6;}
  .inset svg.map path{stroke-width:.7;}
  .tip{position:fixed;pointer-events:none;background:var(--ink);color:#fff;font-family:var(--mono);font-size:11px;
       padding:7px 9px;border-radius:5px;opacity:0;transition:opacity .1s;z-index:20;max-width:250px;line-height:1.4;
       box-shadow:0 4px 14px rgba(0,0,0,.25);}
  .tiphead{font-weight:700;font-size:12px;margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid rgba(255,255,255,.22);}
  .tiphead span{float:right;font-weight:400;opacity:.65;}
  .tipsec{font-size:9px;text-transform:uppercase;letter-spacing:.09em;opacity:.6;margin:6px 0 2px;}
  .tiprow{display:flex;align-items:center;gap:6px;font-size:11px;line-height:1.55;}
  .tiprow b{margin-left:auto;padding-left:10px;font-variant-numeric:tabular-nums;font-weight:600;}
  .tiprow.muted{opacity:.68;}
  .tiprow.win{font-weight:600;}
  .tsw{display:inline-block;width:8px;height:8px;border-radius:2px;flex:0 0 auto;}
  .natwrap{position:relative;}
  .natwrap svg.map path{vector-effect:non-scaling-stroke;}
  svg.map.zoomable{cursor:grab;touch-action:none;}
  svg.map.zoomable.grabbing{cursor:grabbing;}
  .zoomctrls{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px;z-index:5;}
  .zoombtn{width:30px;height:30px;font-family:var(--mono);font-size:15px;line-height:1;background:#FFFDF7;
           border:1px solid var(--line);border-radius:4px;cursor:pointer;color:var(--ink);padding:0;}
  .zoombtn.rst{width:auto;padding:0 8px;font-size:11px;height:30px;}
  .zoombtn:hover{background:#fff;border-color:var(--ink);}
  .legrow{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;font-size:13px;}
  .leg{display:flex;align-items:center;gap:5px;}
  /* seat lists */
  .catblock{border-top:1px solid var(--line);padding:8px 0;}
  .cathead{display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:600;}
  .cathead .count{font-family:var(--mono);color:var(--muted);font-weight:400;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 4px;}
  .chip{font-size:12px;font-family:var(--mono);padding:2px 7px;border:1px solid var(--line);border-radius:10px;cursor:pointer;background:#fff;}
  .chip:hover{border-color:var(--ink);}
  .chip.sel{background:var(--ink);color:#fff;border-color:var(--ink);}
  .note{font-size:12px;color:var(--muted);line-height:1.5;}
</style></head>

      var row=el('div',{class:'spx-row'});
      row.appendChild(el('div',{class:'plabel'},[ el('span',{class:'swatch',style:'background:'+color(p)}), fn(p) ]));
      var range=el('input',{type:'range',class:'spx-slider',min:'0',max:'60',step:'0.1',value:prim[p]});
      var num=el('input',{type:'number',class:'spx-input',step:'0.1',min:'0',max:'100',value:prim[p]});
      range.oninput=function(){ prim[p]=clamp(+range.value); num.value=prim[p]; update(); };
      num.oninput=function(){ prim[p]=clamp(+num.value); range.value=prim[p]; update(); };
      row.appendChild(range); row.appendChild(num);
      card.appendChild(row);
    });
    // leftover Others row
    var oRow=el('div',{class:'spx-row'});
    oRow.appendChild(el('div',{class:'plabel'},[ el('span',{class:'swatch',style:'background:'+color('OTH')}), 'Others (implied)' ]));
    var oInfo=el('div',{class:'sub',id:'othInfo',style:'flex:1'});
    var oVal=el('div',{class:'spx-mono',id:'othVal',style:'text-align:right;font-size:18px;min-width:74px;'});
    oRow.appendChild(oInfo); oRow.appendChild(oVal); card.appendChild(oRow);
    card.appendChild(el('button',{class:'btn',onclick:reset},['Reset to 2025 result']));
    return card;
  }
  function buildPrefs(){
    var card=el('div',{class:'spx-card'});
    card.appendChild(el('h2',null,['Two-party preference splits']));
    card.appendChild(el('p',{class:'sub',style:'margin-top:0'},[
      'Where a contest falls to a non-standard pair, these set how third-party preferences split.']));
    var defs=[['alp_vs_coal','ALP vs Coalition','% of third-party votes \u2192 ALP'],
              ['alp_vs_on','ALP vs One Nation','% of third-party votes \u2192 ALP'],
              ['coal_vs_on','Coalition vs One Nation','% of third-party votes \u2192 Coalition']];
    defs.forEach(function(d){
      var key=d[0];
      var row=el('div',{class:'spx-row'});
      row.appendChild(el('div',{style:'min-width:150px'},[ el('div',{style:'font-size:13px;font-weight:600'},[d[1]]),
        el('div',{class:'note'},[d[2]]) ]));
      var range=el('input',{type:'range',class:'spx-slider',min:'30',max:'90',step:'0.1',value:prefs[key]});
      var dev=el('span',{class:'prefdev',id:'dev_'+key,style:'min-width:54px;text-align:right'});
      var num=el('input',{type:'number',class:'spx-input',min:'0',max:'100',step:'0.1',value:prefs[key]});
      range.oninput=function(){ prefs[key]=clamp(+range.value); num.value=prefs[key]; update(); };
      num.oninput=function(){ prefs[key]=clamp(+num.value); range.value=prefs[key]; update(); };
      row.appendChild(range); row.appendChild(dev); row.appendChild(num);
      card.appendChild(row);
    });
    return card;
  }

  /* ---------- map (built once, repainted on update) ---------- */
  var seatEls={}; // seat -> [path elements]
  function svgPathSet(container, paths, w, h, national){
    var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 '+w+' '+h); svg.setAttribute('class','map'+(national?' zoomable':''));
    Object.keys(paths).forEach(function(name){
      var p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d',paths[name]); p.setAttribute('data-seat',name);
      (seatEls[name]=seatEls[name]||[]).push(p);
      svg.appendChild(p);
    });
    container.appendChild(svg);
    return svg;
  }
  function buildMap(){
    var card=el('div',{class:'spx-card'});
    card.appendChild(el('h2',null,['Projected map \u00B7 winner by seat']));
    card.appendChild(el('p',{class:'note',style:'margin-top:0'},[
      'True AEC 2025 electoral boundaries. Scroll or use +/\u2212 to zoom, drag to pan \u2014 zoom in on the capitals to reach the inner-city seats. Hover any seat for its primary vote and final round.']));
    var maprow=el('div',{class:'maprow'});

    // ---------- national map with zoom / pan ----------
    var nat=el('div',{class:'natwrap'});
    var natSvg=svgPathSet(nat, MAP.national, MAP.natW, MAP.natH, true);
    maprow.appendChild(nat);

    var HOME=MAP.home||{x:0,y:0,w:MAP.natW,h:MAP.natH};
    var VB={x:HOME.x,y:HOME.y,w:HOME.w,h:HOME.h};
    var AR=HOME.h/HOME.w, MINW=HOME.w/60, MAXW=HOME.w;
    function applyVB(){ natSvg.setAttribute('viewBox',
      (Math.round(VB.x*10)/10)+' '+(Math.round(VB.y*10)/10)+' '+(Math.round(VB.w*10)/10)+' '+(Math.round(VB.h*10)/10)); }
    function clampVB(){ if(VB.w>MAXW)VB.w=MAXW; VB.h=VB.w*AR;
      VB.x=Math.max(HOME.x,Math.min(HOME.x+HOME.w-VB.w,VB.x));
      VB.y=Math.max(HOME.y,Math.min(HOME.y+HOME.h-VB.h,VB.y)); }
    function svc(cx,cy){ var r=natSvg.getBoundingClientRect();
      return {x:VB.x+(cx-r.left)/r.width*VB.w, y:VB.y+(cy-r.top)/r.height*VB.h}; }
    function zoomAt(factor,px,py){ var nw=Math.max(MINW,Math.min(MAXW,VB.w*factor));
      var s=nw/VB.w; VB.x=px-(px-VB.x)*s; VB.y=py-(py-VB.y)*s; VB.w=nw; clampVB(); applyVB(); }
    function zoomCenter(f){ zoomAt(f, VB.x+VB.w/2, VB.y+VB.h/2); }
    function resetVB(){ VB={x:HOME.x,y:HOME.y,w:HOME.w,h:HOME.h}; applyVB(); }
    applyVB();

    var ctrls=el('div',{class:'zoomctrls'},[
      el('button',{class:'zoombtn',title:'Zoom in',onclick:function(){zoomCenter(0.7);}},['+']),
      el('button',{class:'zoombtn',title:'Zoom out',onclick:function(){zoomCenter(1/0.7);}},['\u2212']),
      el('button',{class:'zoombtn rst',title:'Reset view',onclick:resetVB},['Reset'])
    ]);
    nat.appendChild(ctrls);

    // wheel zoom (cursor-anchored)
    natSvg.addEventListener('wheel',function(e){ e.preventDefault();
      var pt=svc(e.clientX,e.clientY); zoomAt(e.deltaY>0?1.18:1/1.18, pt.x, pt.y); },{passive:false});

    // mouse drag pan
    var dragging=false, panMoved=false, sx, sy, sVB;
    natSvg.addEventListener('mousedown',function(e){ dragging=true; panMoved=false;
      sx=e.clientX; sy=e.clientY; sVB={x:VB.x,y:VB.y,w:VB.w,h:VB.h}; natSvg.classList.add('grabbing'); });
    window.addEventListener('mousemove',function(e){ if(!dragging)return; var r=natSvg.getBoundingClientRect();
      if(Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>3) panMoved=true;
      VB.x=sVB.x-(e.clientX-sx)/r.width*sVB.w; VB.y=sVB.y-(e.clientY-sy)/r.height*sVB.h; clampVB(); applyVB(); });
    window.addEventListener('mouseup',function(){ dragging=false; natSvg.classList.remove('grabbing'); });

    // touch: one-finger pan, two-finger pinch
    var tMode=null, tDist=0, tVB=null, tpx=0, tpy=0;
    natSvg.addEventListener('touchstart',function(e){
      if(e.touches.length===1){ tMode='pan'; tpx=e.touches[0].clientX; tpy=e.touches[0].clientY; tVB={x:VB.x,y:VB.y,w:VB.w,h:VB.h}; }
      else if(e.touches.length===2){ tMode='pinch';
        tDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
        tVB={x:VB.x,y:VB.y,w:VB.w,h:VB.h};
        var pt=svc((e.touches[0].clientX+e.touches[1].clientX)/2,(e.touches[0].clientY+e.touches[1].clientY)/2);
        tpx=pt.x; tpy=pt.y; }
    },{passive:false});
    natSvg.addEventListener('touchmove',function(e){ e.preventDefault(); var r=natSvg.getBoundingClientRect();
      if(tMode==='pan'&&e.touches.length===1){
        VB.x=tVB.x-(e.touches[0].clientX-tpx)/r.width*tVB.w; VB.y=tVB.y-(e.touches[0].clientY-tpy)/r.height*tVB.h; clampVB(); applyVB(); }
      else if(tMode==='pinch'&&e.touches.length===2){
        var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
        var nw=Math.max(MINW,Math.min(MAP.natW,tVB.w*(tDist/d))); var s=nw/tVB.w;
        VB.w=nw; VB.x=tpx-(tpx-tVB.x)*s; VB.y=tpy-(tpy-tVB.y)*s; clampVB(); applyVB(); }
    },{passive:false});
    natSvg.addEventListener('touchend',function(e){ if(e.touches.length===0) tMode=null; });

    card.appendChild(maprow);

    // legend
    var leg=el('div',{class:'legrow'});
    PARTY_ORDER.forEach(function(c){ if(!STATE.tally[c])return;
      leg.appendChild(el('div',{class:'leg'},[ el('span',{class:'swatch',style:'background:'+color(c)}), fn(c) ])); });
    card.appendChild(leg);

    // hover tooltip + click-to-select (suppress a select that was actually a pan)
    card.addEventListener('mousemove',function(e){ if(dragging){ tip.style.opacity='0'; return; }
      var t=e.target; if(t.tagName==='path'&&t.getAttribute('data-seat')){
        var x=STATE.byseat[t.getAttribute('data-seat')];
        if(!x){ tip.style.opacity='0'; return; }
        tip.innerHTML=tipHTML(x); tip.style.opacity='1';
        var tw=tip.offsetWidth, th=tip.offsetHeight, L=e.clientX+15, T=e.clientY+15;
        if(L+tw>window.innerWidth-8) L=e.clientX-tw-15;
        if(T+th>window.innerHeight-8) T=e.clientY-th-15;
        tip.style.left=Math.max(4,L)+'px'; tip.style.top=Math.max(4,T)+'px';
      } else { tip.style.opacity='0'; } });
    card.addEventListener('mouseleave',function(){ tip.style.opacity='0'; });
    card.addEventListener('click',function(e){ if(panMoved){ panMoved=false; return; }
      var t=e.target; if(t.tagName==='path'&&t.getAttribute('data-seat')){ selectSeat(t.getAttribute('data-seat'),true); } });
    return card;
  }

  /* ---------- tally + seat lists ---------- */
  var tallyWrap, listsWrap;
  function buildResults(){
    var card=el('div',{class:'spx-card'});
    card.appendChild(el('h2',null,['Projected seats (150 total, 76 for majority)']));
    tallyWrap=el('div',{style:'margin:22px 0 10px'}); card.appendChild(tallyWrap);
    listsWrap=el('div'); card.appendChild(listsWrap);
    return card;
  }
  function paintTally(){
    tallyWrap.innerHTML='';
    var bar=el('div',{class:'bar'});
    var cats=Object.keys(STATE.tally).sort((a,b)=>(PARTY_ORDER.indexOf(a)+99*(PARTY_ORDER.indexOf(a)<0))-(PARTY_ORDER.indexOf(b)+99*(PARTY_ORDER.indexOf(b)<0)));
    cats.forEach(function(c){
      var n=STATE.tally[c];
      bar.appendChild(el('div',{class:'seg',style:'flex:'+n+' 0 0;background:'+color(c),title:fn(c)+' '+n},[ n>=6?String(n):'' ]));
    });
    var maj=el('div',{class:'maj',style:'left:'+(76/150*100)+'%'}); bar.appendChild(maj);
    tallyWrap.appendChild(bar);
    var summ=el('div',{class:'sub',style:'margin-top:14px'});
    var lead=cats.slice().sort((a,b)=>STATE.tally[b]-STATE.tally[a])[0];
    summ.textContent=fn(lead)+' leads with '+STATE.tally[lead]+' seats'+
      (STATE.tally[lead]>=76?' \u2014 majority government.':' \u2014 short of the 76 needed for majority.');
    tallyWrap.appendChild(summ);
  }
  function paintLists(){
    listsWrap.innerHTML='';
    var groups={}; STATE.results.forEach(r=>{ (groups[r.winnerCat]=groups[r.winnerCat]||[]).push(r); });
    var cats=Object.keys(groups).sort((a,b)=>groups[b].length-groups[a].length);
    cats.forEach(function(c){
      var seats=groups[c].sort((a,b)=>a.seat.localeCompare(b.seat));
      var block=el('div',{class:'catblock'});
      var open=expanded.has(c);
      var head=el('div',{class:'cathead',onclick:function(){ open?expanded.delete(c):expanded.add(c); paintLists(); }},[
        el('span',{class:'swatch',style:'background:'+color(c)}),
        el('span',null,[fn(c)]),
        el('span',{class:'count'},['\u2014 '+seats.length+' seat'+(seats.length>1?'s':'')+'  '+(open?'\u25BE':'\u25B8')])
      ]);
      block.appendChild(head);
      if(open){
        var chips=el('div',{class:'chips'});
        seats.forEach(function(r){
          var chip=el('div',{class:'chip'+(selected===r.seat?' sel':''),'data-seat':r.seat,
            title:r.margin+' pp margin',onclick:function(){ selectSeat(r.seat,true); }},[ r.seat ]);
          chips.appendChild(chip);
        });
        block.appendChild(chips);
      }
      listsWrap.appendChild(block);
    });
  }

  /* ---------- selection + paint ---------- */
  function selectSeat(name,scroll){
    selected=(selected===name?null:name);
    repaintColors();
    paintLists();
    if(selected&&scroll){
      var cat=STATE.byseat[selected].winnerCat; expanded.add(cat); paintLists();
    }
  }
  function repaintColors(){
    Object.keys(seatEls).forEach(function(name){
      var x=STATE.byseat[name]; var col=x?color(x.winnerCat):Y.OTH;
      seatEls[name].forEach(function(p){ p.setAttribute('fill',col);
        p.classList.toggle('sel', selected===name); });
    });
  }

  /* ---------- update loop ---------- */
  function clamp(v){ v=Number(v); if(isNaN(v))v=0; return Math.max(0,Math.min(100,Math.round(v*10)/10)); }
  function reset(){ qo.forEach(p=>prim[p]=Cl[p]); Object.keys(Zo).forEach(k=>prefs[k]=Zo[k]); rebuildInputs(); update(); }
  function update(){
    STATE=compute();
    // Others leftover
    var used=qo.reduce((s,p)=>s+prim[p],0); var oth=Math.round((100-used)*10)/10;
    document.getElementById('othVal').textContent=oth+'%';
    document.getElementById('othInfo').textContent='2025 baseline was '+Cl.OTH+'%';
    document.getElementById('othVal').style.color=oth<0?'#c62828':'var(--ink)';
    // pref deviations
    Object.keys(prefs).forEach(function(k){ var el2=document.getElementById('dev_'+k); if(!el2)return;
      var d=Math.round((prefs[k]-50)*10)/10; el2.textContent=(d>=0?'+':'')+d+'pp'; el2.style.color=d>=0?'#2e7d32':'#c62828'; });
    repaintColors(); paintTally(); paintLists();
  }
  // for reset: refresh the slider/number DOM values
  function rebuildInputs(){
    root.querySelectorAll('input[type=range],input[type=number]').forEach(function(){});
    render(); // simplest: full rebuild
  }

  function render(){
    root.innerHTML='';
    var head=el('div',{class:'head'});
    head.appendChild(el('div',{class:'eyebrow'},['2025 baseline \u00B7 uniform national swing model']));
    head.appendChild(el('h1',null,['Australian House Seat Projector']));
    root.appendChild(head);
    seatEls={};
    root.appendChild(buildControls());
    root.appendChild(buildPrefs());
    root.appendChild(buildResults());
    root.appendChild(buildMap());
    update();
  }
  render();
})();
</script></body></html>
