h1{font-size:18px;font-weight:500;margin-bottom:1.5rem;}
.section{margin-bottom:1.5rem;}
.inputs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:10px;margin-bottom:1rem;}

.input-row input[type=number]{flex:1;min-width:0;font-size:14px;border:0.5px solid #ddddd5;border-radius:6px;padding:5px 8px;outline:none;background:#fff;color:#1a1a18;}
.input-row input[type=number]:focus{border-color:#888780;}
.pct{font-size:13px;color:#888780;}
.pdot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0;}
.total-warn{font-size:12px;margin-bottom:1rem;padding:7px 12px;border-radius:8px;border:0.5px solid #ddddd5;color:#5f5e5a;background:#f1efe8;}
.total-warn.bad{color:#a32d2d;background:#fcebeb;border-color:#f09595;}
.results-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1rem;}
.result-card{background:#f1efe8;border-radius:8px;padding:0.75rem 1rem;}
.result-card .pname{font-size:11px;color:#5f5e5a;margin-bottom:3px;display:flex;align-items:center;}
.result-card .seats{font-size:24px;font-weight:500;color:#1a1a18;}
.result-card .chg{font-size:11px;margin-top:1px;}
.chg.pos{color:#3b6d11;}.chg.neg{color:#a32d2d;}.chg.neu{color:#888780;}
.parl-bar{display:flex;height:22px;border-radius:8px;overflow:hidden;margin-bottom:6px;}
.bar-legend{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:#5f5e5a;margin-bottom:1rem;}
.bar-legend span{display:flex;align-items:center;gap:3px;}
.majority-line{font-size:12px;color:#5f5e5a;margin-bottom:1.25rem;padding:7px 12px;background:#f1efe8;border-radius:8px;border-left:3px solid #b4b2a9;}
.divider{border:none;border-top:0.5px solid #ddddd5;margin:1.5rem 0;}
.coalition-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;flex-wrap:wrap;gap:8px;}
.coalition-header h3{font-size:14px;font-weight:500;color:#1a1a18;}
.coalition-checks{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:0.75rem;}
.coalition-checks label{display:flex;align-items:center;gap:5px;font-size:12px;color:#1a1a18;background:#fff;border:0.5px solid #b4b2a9;border-radius:8px;padding:4px 10px;cursor:pointer;user-select:none;}
.coalition-checks label:hover{background:#f1efe8;}
.coalition-checks input[type=checkbox]{width:13px;height:13px;}
.coalition-result{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;background:#f1efe8;margin-bottom:0.75rem;flex-wrap:wrap;}
.coalition-seats{font-size:22px;font-weight:500;color:#1a1a18;}
.coalition-label{font-size:12px;color:#5f5e5a;}
.coalition-status{font-size:12px;font-weight:500;padding:3px 10px;border-radius:8px;}

.sq{width:100%;aspect-ratio:1;border-radius:1px;transition:opacity 0.1s;}
.grid-legend{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:#5f5e5a;margin-bottom:1.5rem;}
.grid-legend span{display:flex;align-items:center;gap:4px;}
.grid-legend .swatch{width:10px;height:10px;border-radius:2px;display:inline-block;}
details summary{cursor:pointer;font-size:12px;color:#5f5e5a;padding:5px 0;user-select:none;}
details summary:hover{color:#1a1a18;}
.seats-table{width:100%;border-collapse:collapse;font-size:11px;}
.seats-table th{text-align:left;padding:5px 7px;color:#5f5e5a;font-weight:500;border-bottom:0.5px solid #ddddd5;white-space:nowrap;cursor:pointer;user-select:none;}

  oc.innerHTML=`<label><span class="pdot" style="background:#888780"></span>Minor parties <span style="color:#888780;font-size:11px;">(redistributed)</span></label><div style="font-size:12px;color:#888780;padding-top:4px;">2023 MUDA+PSM+PRM+IND votes redistributed proportionally before swing.</div>`;
  ig.appendChild(oc);

  const cc=document.getElementById('coalitionChecks');
  PARTIES.forEach(p=>{
    const lbl=document.createElement('label');
    lbl.innerHTML=`<input type="checkbox" id="chk_${p.id}"><span class="pdot" style="background:${p.color}"></span>${p.label}`;
    lbl.querySelector('input').addEventListener('change',updateCoalition);
    cc.appendChild(lbl);
  });
  project();
});

function renderComponentBreakdown(){
  const div=document.getElementById('componentBreakdown');div.innerHTML='';
  const partyMap={};
  Object.entries(W23).forEach(([sid,coal])=>{
    const comp=(SEAT_CANDIDATES[sid]||{})[coal]||coal;
    if(!partyMap[coal])partyMap[coal]={};
    if(!partyMap[coal][comp])partyMap[coal][comp]={base:0,now:0};
    partyMap[coal][comp].base++;
  });
  curDetails.forEach(d=>{
    const coal=d.coalW;
    const cands=SEAT_CANDIDATES[d.id]||{};
    const comp=cands[coal]||coal;
    if(!partyMap[coal])partyMap[coal]={};
    if(!partyMap[coal][comp])partyMap[coal][comp]={base:0,now:0};
    partyMap[coal][comp].now++;
  });
  ['PH','BN','PN','BP','BERSAMA'].forEach(cid=>{
    const party=PARTIES.find(p=>p.id===cid);if(!party)return;
    const cdata=partyMap[cid];if(!cdata)return;
    const totalNow=Object.values(cdata).reduce((a,b)=>a+b.now,0);
    if(totalNow===0&&!Object.values(cdata).some(v=>v.base>0))return;
    const card=document.createElement('div');
    card.style.cssText='background:#fff;border:0.5px solid #ddddd5;border-radius:10px;padding:0.75rem 1rem;';
    let rows='';
    Object.entries(cdata).sort((a,b)=>b[1].now-a[1].now).forEach(([comp,counts])=>{
      if(counts.now===0&&counts.base===0)return;
      const delta=counts.now-counts.base;
      const chgStr=delta>0?`+${delta}`:delta<0?`${delta}`:'—';
      const chgCol=delta>0?'#3b6d11':delta<0?'#a32d2d':'#888780';
      rows+=`<div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:2px 0;"><span style="color:#5f5e5a;">${comp}</span><span style="font-weight:500;">${counts.now} <span style="color:${chgCol};font-size:10px;">${chgStr}</span></span></div>`;
    });
    card.innerHTML=`<div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;"><span style="width:9px;height:9px;border-radius:50%;background:${party.color};display:inline-block;flex-shrink:0;"></span><span style="font-size:12px;font-weight:500;">${party.label}</span><span style="margin-left:auto;font-size:13px;font-weight:500;">${totalNow}</span></div>${rows}`;
    div.appendChild(card);
  });
}

function renderVoteShareBreakdown(){
  const div=document.getElementById('voteShareBreakdown');div.innerHTML='';
  const ns={};PARTIES.forEach(p=>{ns[p.id]=parseFloat(inputEls[p.id].value)||0;});
  const coalVoteCol={PH:2,BN:3,PN:4,BP:5};
  const compVotes={};
  SEATS.forEach(s=>{
    const sid=s[0];
    const cands=SEAT_CANDIDATES[sid]||{};
    Object.entries(cands).forEach(([cid,comp])=>{
      const colIdx=coalVoteCol[cid];
      const votes=colIdx!=null?(s[colIdx]||0):0;
      if(votes<=0)return;
      if(!compVotes[cid])compVotes[cid]={};
      compVotes[cid][comp]=(compVotes[cid][comp]||0)+votes;
    });
  });
  const coalOrder=['PH','BN','PN','BP','BERSAMA'];
  const container=document.createElement('div');
  container.style.cssText='display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;';
  coalOrder.forEach(cid=>{
    const party=PARTIES.find(p=>p.id===cid);if(!party)return;
    const coalPct=ns[cid]||0;if(!coalPct)return;
    const cdata=compVotes[cid];
    let compWeights={};
    if(!cdata||Object.keys(cdata).length===0){
      curDetails.forEach(d=>{
        const comp=(SEAT_CANDIDATES[d.id]||{})[cid];
        if(!comp)return;
        compWeights[comp]=(compWeights[comp]||0)+(d.tot2||0);
      });
    } else { compWeights=cdata; }
    if(!Object.keys(compWeights).length)return;
    const totalW=Object.values(compWeights).reduce((a,b)=>a+b,0);
    const card=document.createElement('div');
    card.style.cssText='background:#fff;border:0.5px solid #ddddd5;border-radius:10px;padding:0.75rem 1rem;';
    let rows='';
    Object.entries(compWeights).sort((a,b)=>b[1]-a[1]).forEach(([comp,w])=>{
      const compPct=(coalPct*(w/totalW)).toFixed(1);
      rows+=`<div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:2px 0;"><span style="color:#5f5e5a;">${comp}</span><span style="font-weight:500;">${compPct}%</span></div>`;
    });
    card.innerHTML=`<div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;"><span style="width:9px;height:9px;border-radius:50%;background:${party.color};display:inline-block;flex-shrink:0;"></span><span style="font-size:12px;font-weight:500;">${party.label}</span><span style="margin-left:auto;font-size:13px;font-weight:500;">${coalPct.toFixed(1)}%</span></div>${rows}`;
    container.appendChild(card);
  });
  div.appendChild(container);
}

function renderTable(){
  const thead=document.getElementById('seatsHead');thead.innerHTML='';
  const tbody=document.getElementById('seatsBody');tbody.innerHTML='';
  const cols=[
    {key:'id',label:'Seat'},{key:'name',label:'Name'},
    {key:'w23',label:'2023'},{key:'projW',label:'Proj.'},
    {key:'ph',label:'PH%'},{key:'bn',label:'BN%'},
    {key:'pn',label:'PN%'},{key:'bp',label:'MUDA%'},
    {key:'bersama',label:'BERSAMA%'},{key:'minors',label:'Others'},
  ];
  const tr=document.createElement('tr');
  cols.forEach(c=>{
    const th=document.createElement('th');
    th.textContent=c.label;
    if(c.key===sortCol)th.className=sortDir===1?'sort-asc':'sort-desc';
    th.addEventListener('click',()=>{
      if(sortCol===c.key)sortDir*=-1;else{sortCol=c.key;sortDir=1;}
      renderTable();
    });
    tr.appendChild(th);
  });
  thead.appendChild(tr);
  const sorted=[...curDetails].sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if(typeof av==='string')return sortDir*av.localeCompare(bv);
    return sortDir*(av-bv);
  });
  sorted.forEach(d=>{
    const tr=document.createElement('tr');
    const isFlip=d.projW!==d.w23;
    const winParty=PARTIES.find(p=>p.id===d.coalW);
    const winColor=winParty?winParty.color:'#888780';
    const w23Party=PARTIES.find(p=>p.id===d.w23);
    const w23Color=w23Party?w23Party.color:'#888780';
    const cands=SEAT_CANDIDATES[d.id]||{};
    const projComp=cands[d.coalW]||d.coalW;
    const w23Comp=cands[d.w23]||d.w23;
    [
      {v:d.id},{v:d.name},
      {v:`<span style="color:${w23Color};font-weight:500;">${d.w23}</span> <span style="color:#888780;font-size:10px;">(${w23Comp})</span>`},
      {v:`<span style="color:${winColor};font-weight:500;">${d.coalW}</span> <span style="color:#888780;font-size:10px;">(${projComp})</span>${isFlip?'<span class="flip-tag">flip</span>':''}`},
      {v:d.proj.PH!=null?d.proj.PH.toFixed(1):'—'},
      {v:d.proj.BN!=null?d.proj.BN.toFixed(1):'—'},
      {v:d.proj.PN!=null?d.proj.PN.toFixed(1):'—'},
      {v:d.proj.BP!=null&&d.proj.BP>0?d.proj.BP.toFixed(1):'—'},
      {v:d.proj.BERSAMA!=null&&d.proj.BERSAMA>0?d.proj.BERSAMA.toFixed(1):'—'},
    ].forEach(cell=>{
      const td=document.createElement('td');td.innerHTML=cell.v;tr.appendChild(td);
    });
    const tdm=document.createElement('td');tdm.className='minor-cell';
    const minorParts=Object.entries(d.minors||{}).filter(([,v])=>v>0.1).map(([party,pct])=>{
      const col=MINOR_COLORS[party]||'#888780';
      return `<span style="color:${col};font-size:10px;">${party} ${pct.toFixed(1)}%</span>`;
    });
    tdm.innerHTML=minorParts.join('<span style="color:#ddddd5;"> · </span>')||'<span style="color:#ddddd5;">--</span>';
    tr.appendChild(tdm);
    tbody.appendChild(tr);
  });
}

function project(){
  const ns={};PARTIES.forEach(p=>{ns[p.id]=parseFloat(inputEls[p.id].value)||0;});
  const tot=Object.values(ns).reduce((a,b)=>a+b,0);
  const w=document.getElementById('totalWarn');
  w.textContent=`Total: ${tot.toFixed(1)}% — ideally ~100%`;
  w.className='total-warn'+(Math.abs(tot-100)>5?' bad':'');

  const sw={},sc={};
  PARTIES.forEach(p=>{sw[p.id]=ns[p.id]-(GN[p.id]||0);sc[p.id]=taper(p.id,ns[p.id]);});

  const FOLDED_MINORS=new Set(['OTH','IND','PRM']);
  const det=[];

  SEATS.forEach(s=>{
    const[id,name,ph,bn,pn,bp,tot2,minorVotes]=s;
    if(!tot2)return;

    let basePH=ph/tot2*100,baseBN=bn/tot2*100,basePN=pn/tot2*100,baseBP=bp/tot2*100;

    // Redistribute absent minors proportionally
    let absentTotal=0;
    Object.entries(minorVotes||{}).forEach(([k,v])=>{if(FOLDED_MINORS.has(k))absentTotal+=v/tot2*100;});
    if(absentTotal>0){
      const contestBase=basePH+baseBN+basePN+baseBP;
      if(contestBase>0){
        basePH+=absentTotal*(basePH/contestBase);
        baseBN+=absentTotal*(baseBN/contestBase);
        basePN+=absentTotal*(basePN/contestBase);
        baseBP+=absentTotal*(baseBP/contestBase);
      }
    }

    const base={PH:basePH,BN:baseBN,PN:basePN,BP:baseBP,BERSAMA:0};
    const minorPct={};
    Object.entries(minorVotes||{}).forEach(([k,v])=>{if(!FOLDED_MINORS.has(k)){minorPct[k]=v/tot2*100;}});

    const raw={};PARTIES.forEach(p=>{raw[p.id]=Math.max(0,base[p.id]+sw[p.id]);});
    const tap={};PARTIES.forEach(p=>{tap[p.id]=raw[p.id]*sc[p.id];});
    const tOut=PARTIES.reduce((a,p)=>a+(raw[p.id]-tap[p.id]),0);
    const tTot=PARTIES.reduce((a,p)=>a+tap[p.id],0);
    const proj={};
    if(tTot>0&&tOut>0){
      PARTIES.forEach(p=>{proj[p.id]=tap[p.id]+tOut*(tap[p.id]/tTot);});
    } else {
      PARTIES.forEach(p=>{proj[p.id]=tap[p.id];});
    }

    const allCands={...proj};
    Object.entries(minorPct).forEach(([k,v])=>{allCands[k]=v;});
    const winner=Object.entries(allCands).sort((a,b)=>b[1]-a[1])[0][0];
    const coalW=PARTIES.find(p=>p.id===winner)?winner:'OTHERS';

    det.push({
      id,name,
      w23:W23[id]||'OTHERS',
      projW:winner,coalW,
      proj,base,
      ph:proj.PH,bn:proj.BN,pn:proj.PN,bp:proj.BP,bersama:proj.BERSAMA,
      minors:minorPct,
      tot2,
    });
  });

  curDetails=det;

  const tally={};
  PARTIES.forEach(p=>{tally[p.id]=0;});tally.OTHERS=0;
  det.forEach(d=>{tally[d.coalW]=(tally[d.coalW]||0)+1;});

  const rg=document.getElementById('resultsGrid');rg.innerHTML='';
  PARTIES.forEach(p=>{
    const n=tally[p.id]||0;
    const base=GS[p.id]||0;
    const delta=n-base;
    const chgStr=delta>0?`+${delta}`:delta<0?`${delta}`:'—';
    const chgCls=delta>0?'pos':delta<0?'neg':'neu';
    const card=document.createElement('div');card.className='result-card';
    card.innerHTML=`<div class="pname"><span class="pdot" style="background:${p.color}"></span>${p.label}</div><div class="seats">${n}</div><div class="chg ${chgCls}">${chgStr} vs 2023</div>`;
    rg.appendChild(card);
  });

  const pb=document.getElementById('parlBar');pb.innerHTML='';
  PARTIES.forEach(p=>{
    const n=tally[p.id]||0;if(!n)return;
    const seg=document.createElement('div');
    seg.style.cssText=`flex:${n};background:${p.color};`;
    pb.appendChild(seg);
  });
  document.getElementById('barLegend').innerHTML=
    PARTIES.filter(p=>tally[p.id]>0).map(p=>`<span><span style="width:10px;height:10px;border-radius:50%;background:${p.color};display:inline-block;"></span>${p.label}: ${tally[p.id]}</span>`).join('');

  const maj=29;
  const phbn=(tally.PH||0)+(tally.BN||0);
  document.getElementById('majorityLine').textContent=`Majority: 29 of 56 seats. PH+BN combined: ${phbn} seats${phbn>=maj?' ✓ majority':''}`;

  renderTable();
  renderComponentBreakdown();
  renderVoteShareBreakdown();
  updateCoalition();

  document.getElementById('methodNote').textContent=
    'Methodology: Universal national swing (UNS) from 2023 Selangor state election results. 2023 baseline derived by splitting each seat\'s unity (PH-BN pact) vote asymmetrically: in PH-won seats (and PN-won seats where PH was the unity candidate), PH receives 92% and BN 8% of the unity vote in PH-contested seats; in BN-contested seats, BN receives 60% and PH 40%. Seat-level unity and PN vote counts are derived from official 2023 EC majority and turnout data published by ElectionData.MY. This produces statewide baselines of approximately PH 51.2%, BN 9.7%, PN 38.2%. Note: seat-level vote counts are estimates derived from registered voter data and statewide proportions, as official EC seat-level totals were not available; two seats (N36 Bandar Utama, N52 Banting) use confirmed reported figures. BP (MUDA+PSM) and BERSAMA are assumed to contest all 56 seats. 2023 minor party votes (MUDA, PSM, PRM, Independents) redistributed proportionally before swing is applied. Taper scalar applied below 50% of each party\'s baseline share. Majority: 29 of 56 seats.';
}

function updateCoalition(){
  const selected=PARTIES.filter(p=>document.getElementById('chk_'+p.id)?.checked).map(p=>p.id);
  const total=selected.reduce((a,p)=>a+(curDetails.filter(d=>d.coalW===p).length),0);
  document.getElementById('coalSeats').textContent=total;
  const maj=29;
  const statusEl=document.getElementById('coalStatus');
  const labelEl=document.getElementById('coalLabel');
  if(selected.length===0){labelEl.textContent='seats — select coalitions above';statusEl.className='coalition-status status-none';statusEl.textContent='-';}
  else if(total>=maj){labelEl.textContent=`seats — majority government`;statusEl.className='coalition-status status-maj';statusEl.textContent='Majority';}
  else{labelEl.textContent=`seats — ${maj-total} short of majority`;statusEl.className='coalition-status status-short';statusEl.textContent='Short';}

  const pg=document.getElementById('parlGrid');pg.innerHTML='';
  const gl=document.getElementById('gridLegend');gl.innerHTML='';
  const inCoal=new Set(selected);
  const cs=[],os=[];
  PARTIES.forEach(p=>{
    const n=curDetails.filter(d=>d.coalW===p.id).length;
    const target=inCoal.has(p.id)?cs:os;
    for(let i=0;i<n;i++)target.push({color:p.color,inCoal:inCoal.has(p.id),label:p.label});
  });
  [...cs,...os].forEach(g=>{
    const sq=document.createElement('div');sq.className='sq';
    sq.style.background=g.color;
    sq.style.opacity=inCoal.size===0?'1':(g.inCoal?'1':'0.2');
    pg.appendChild(sq);
  });
  PARTIES.forEach(p=>{
    if(!curDetails.some(d=>d.coalW===p.id))return;
    const sp=document.createElement('span');
    sp.innerHTML=`<span class="swatch" style="background:${p.color};"></span>${p.label}`;
    gl.appendChild(sp);
  });
}
